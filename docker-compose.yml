version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: my-calculator-web
    ports:
      - "8080:80"
    volumes:
      # Mount HTML files for development (comment out for production)
      - ./:/usr/share/nginx/html:ro
      # Mount custom nginx.conf for development
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:noexec,nosuid,size=10m
      - /var/run:noexec,nosuid,size=5m

