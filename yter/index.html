<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>YTER Calculator - My Calculator</title>
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/styles/app.css" />
    <link rel="stylesheet" href="assets/styles/yter.css" />
    <script src="../assets/scripts/components/Header.js" defer></script>
    <script src="assets/scripts/yter.js" defer></script>
  </head>
  <body>
    <div id="header-container"></div>

    <section id="yter-calculator">
      <h2>YTER (Y Times E Raised) Calculator</h2>
      <p>Calculate Y multiplied by E raised to the power of R</p>
      <div id="yter-inputs">
        <input type="number" id="input-y" placeholder="Value (Y)" />
        <span id="multiply-symbol">×</span>
        <input type="number" id="input-e" placeholder="Base (E)" />
        <span id="power-symbol">^</span>
        <input type="number" id="input-r" placeholder="Exponent (R)" />
      </div>
      <div id="yter-actions">
        <button type="button" id="btn-calculate">Calculate</button>
        <button type="button" id="btn-clear">Clear</button>
      </div>
    </section>
    <section id="results">
      <h2 id="current-calculation">0</h2>
      <h2>Result: <span id="current-result">0</span></h2>
    </section>
  </body>
</html>
