apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-calculator
  namespace: default
  labels:
    app: my-calculator
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: my-calculator.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: my-calculator
                port:
                  number: 80
  tls:
    - hosts:
        - my-calculator.example.com
      secretName: my-calculator-tls

